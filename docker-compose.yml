version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: echodesk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d echodesk"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://user:password@postgres:5432/echodesk?schema=public"
      REDIS_URL: "redis://redis:6379"
      SESSION_SECRET: "local-dev-secret-not-for-production"
      CSRF_SECRET: "local-dev-csrf-secret-not-for-production"
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node server/dist/index.js"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
